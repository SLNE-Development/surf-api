stages:
  - build
  - publish

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  DYNAMIC_BRANCH: "$CI_DEFAULT_BRANCH"
  MAVEN_USER_SETTINGS: "$CI_PROJECT_DIR/maven-settings.xml"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/wrapper
    - .gradle/caches

before_script:
  - export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
  - echo "$MAVEN_SETTINGS_XML" > "$MAVEN_USER_SETTINGS"


build:
  stage: build
  image: gradle:8.11.1-jdk-21-and-23
  script:
    - gradle clean shadowJar -DuserSettingsFileName="$MAVEN_USER_SETTINGS"
  artifacts:
    paths:
      - build/libs/

publish:
  stage: publish
  image: gradle:8.11.1-jdk-21-and-23
  script:
    - gradle publish -DuserSettingsFileName="$MAVEN_USER_SETTINGS"
  dependencies:
    - build
  only:
    - $DYNAMIC_BRANCH