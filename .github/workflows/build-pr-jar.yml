name: Build PR JAR and Comment

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

env:
  MODULE_REGEX: "surf-api-bukkit-server.*-all\\.jar$|surf-api-velocity-server.*-all\\.jar$|surf-api-standalone-server.*-all\\.jar$"

jobs:
  build_pr:
    if: >
      github.event_name == 'pull_request' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'build-pr-jar') ||
        ((github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize') &&
         contains(github.event.pull_request.labels.*.name, 'build-pr-jar'))
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      jar_json: ${{ steps.jars.outputs.json }}
    steps:
      - name: Capture PR number
        id: pr
        run: echo "number=${{ github.event.pull_request.number }}" >>"$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Build project
        run: ./gradlew build shadowJar --parallel --no-scan

      - name: Run tests
        run: ./gradlew check --parallel --no-scan

      - name: Detect JARs
        id: jars
        run: |
          mapfile -t files < <(find . -path "**/build/libs/*.jar" | grep -E "${MODULE_REGEX}")
          [ ${#files[@]} -gt 0 ] || { echo "No matching JARs found" >&2; exit 1; }
          printf 'JAR_FILES<<EOF\n%s\nEOF\n' "${files[@]}" >>"$GITHUB_ENV"
          json=$(printf '%s\n' "${files[@]}" | jq -R . | jq -s -c .)
          echo "json=${json}" >>"$GITHUB_OUTPUT"

      - name: Upload all JARs
        uses: actions/upload-artifact@v4
        with:
          name: all-jars
          path: ${{ env.JAR_FILES }}
          if-no-files-found: error

  upload_each:
    needs: build_pr
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jar: ${{ fromJson(needs.build_pr.outputs.jar_json) }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          name: all-jars
          path: .

      - name: Determine artifact name
        id: fname
        run: echo "file=$(basename '${{ matrix.jar }}')" >>"$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.fname.outputs.file }}
          path: ${{ matrix.jar }}
          if-no-files-found: error

  comment_pr:
    needs: [build_pr, upload_each]
    if: needs.upload_each.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update PR body
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.build_pr.outputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = process.env.PR_NUMBER;
            const runId = process.env.RUN_ID;

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: runId }
            );

            const files = artifacts
              .filter(a => a.name !== 'all-jars')
              .map(a => `* [${a.name}](https://nightly.link/${owner}/${repo}/actions/artifacts/${a.id}.zip)`)
              .join('\n');

            if (!files) return;

            const marker = '<!-- bot: pr-jar-build -->';
            const { data: prData } = await github.rest.issues.get({ owner, repo, issue_number: pr });
            let body = (prData.body ?? '').split(marker)[0].trim();
            body += `\n${marker}\n---\n${files}`;

            await github.rest.issues.update({ owner, repo, issue_number: pr, body });
