name: Build PR JAR + Comment

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

env:
  MODULE_REGEX: "surf-api-bukkit-server.*-all\\.jar$|surf-api-velocity-server.*-all\\.jar$|surf-api-standalone-server.*-all\\.jar$"

jobs:
  build_pr:
    if: >
      github.event_name == 'pull_request' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'build-pr-jar') ||
        ((github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize') &&
         contains(github.event.pull_request.labels.*.name, 'build-pr-jar'))
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      jar_json: ${{ steps.jars.outputs.json }}

    steps:
      - name: Get PR number
        id: pr
        run: echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up JDK 21 (GraalVM)
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 21

      - name: Build project
        run: ./gradlew build shadowJar --parallel --no-scan

      - name: Run tests
        run: ./gradlew check --parallel --no-scan

      - name: Find JARs and prepare matrix
        id: jars
        run: |
          mapfile -t files < <(find . -path "**/build/libs/*.jar" | grep -E "${MODULE_REGEX}")
          if [ ${#files[@]} -eq 0 ]; then
            echo "No matching JARs found" >&2
            exit 1
          fi
          printf 'JAR_FILES<<EOF\n%s\nEOF\n' "${files[@]}" >>"$GITHUB_ENV"
          jq -Rn --argjson a "$(printf '%s\n' "${files[@]}" | jq -R . | jq -s .)" '$a' > jars.json
          echo "json=$(cat jars.json)" >>"$GITHUB_OUTPUT"

  upload_each:
    needs: build_pr
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jar: ${{ fromJson(needs.build_pr.outputs.jar_json) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Upload ${{ matrix.jar }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ basename(matrix.jar) }}
          path: ${{ matrix.jar }}
          if-no-files-found: error

  comment_pr:
    needs: [build_pr, upload_each]
    if: always() && needs.upload_each.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Comment PR with download links
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.build_pr.outputs.pr_number }}
        with:
          script: |
            const {owner, repo} = context.repo;
            const prNum = process.env.PR_NUMBER;

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {owner, repo, run_id: context.runId}
            );

            if (!artifacts.length) return;

            const lines = artifacts.map(a =>
              `* [${a.name}](https://nightly.link/${owner}/${repo}/actions/artifacts/${a.id}.zip)`);

            const bodyBlock = '**Build Artifacts**\n' + lines.join('\n');
            const marker = '<!-- bot: pr-jar-build -->';

            const {data: pr} = await github.rest.issues.get({owner, repo, issue_number: prNum});
            let newBody = (pr.body ?? '').split(marker)[0].trim();
            newBody += `\n${marker}\n---\n${bodyBlock}`;

            await github.rest.issues.update({owner, repo, issue_number: prNum, body: newBody});
